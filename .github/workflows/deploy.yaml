name: Deploy to EC2

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Build and Push to Dockerhub"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Deploy via SSM
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/spincd:latest
        run: |
          COMPOSE_B64=$(base64 -w0 docker-compose.yaml)
          jq -n \
            --arg compose "$COMPOSE_B64" \
            --arg image "$DOCKER_IMAGE" \
            '{commands: [
              "mkdir -p /opt/spincd && chown ubuntu:ubuntu /opt/spincd",
              ("echo " + $compose + " | base64 -d > /opt/spincd/docker-compose.yaml"),
              "chown ubuntu:ubuntu /opt/spincd/docker-compose.yaml",
              ("grep -q DOCKER_IMAGE /opt/spincd/.env 2>/dev/null || echo DOCKER_IMAGE=" + $image + " > /opt/spincd/.env"),
              "cd /opt/spincd && docker compose pull && docker compose up -d --remove-orphans && docker image prune -f"
            ]}' > /tmp/ssm-params.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters file:///tmp/ssm-params.json \
            --query "Command.CommandId" --output text)

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" || true

          echo "=== STDOUT ===" && aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" --output text

          echo "=== STDERR ===" && aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardErrorContent" --output text

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "Status" --output text)
          [ "$STATUS" = "Success" ] || exit 1
